<!DOCTYPE html>
<html>

<head>
    <title>AR Business Card - Rizky Abdillah</title>
    <!-- Load A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Load A-Frame Extras for animation control -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <!-- CSS styling for Scan Overlay and fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }
        #ar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            color: white;
            text-align: center;
        }
        .overlay-content {
            max-width: 320px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .scan-frame {
            width: 160px;
            height: 160px;
            border: 4px solid #5e17eb;
            border-radius: 24px;
            position: relative;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(94, 23, 235, 0.4);
            animation: pulseFrame 2s infinite ease-in-out;
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #a29bfe, #5e17eb, #a29bfe, transparent);
            animation: scanAnimation 2s infinite linear;
            box-shadow: 0 0 10px #5e17eb;
        }
        @keyframes scanAnimation {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        @keyframes pulseFrame {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 30px rgba(94, 23, 235, 0.6); }
        }
        h2 {
            font-weight: 700;
            font-size: 1.5rem;
            margin: 10px 0 5px 0;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 40%, #a29bfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-weight: 300;
            font-size: 0.9rem;
            line-height: 1.4;
            color: #b2bec3;
            margin: 0;
        }
    </style>

    <script>
        // Custom component for drawing vector brand icons dynamically on Canvas
        AFRAME.registerComponent('social-icon', {
            schema: {
                type: { type: 'string', default: 'globe' },
                iconColor: { type: 'string', default: '#ffffff' }
            },
            init: function () {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');

                // Transparent background
                ctx.clearRect(0, 0, 256, 256);

                // Draw SVG icon
                ctx.fillStyle = this.data.iconColor;
                ctx.save();
                ctx.translate(32, 32); // Center 192x192 icon inside 256x256 canvas
                ctx.scale(12, 12);    // Scale 16x16 Bootstrap path to 192x192

                let pathStr = '';
                const type = this.data.type;
                if (type === 'whatsapp') {
                    pathStr = "M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232";
                } else if (type === 'linkedin') {
                    pathStr = "M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z";
                } else if (type === 'globe') {
                    pathStr = "M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m7.5-6.923c-.67.204-1.335.82-1.887 1.855A8 8 0 0 0 5.145 4H7.5zM4.09 4a9.3 9.3 0 0 1 .64-1.539 7 7 0 0 1 .597-.933A7.03 7.03 0 0 0 2.255 4zm-.582 3.5c.03-.877.138-1.718.312-2.5H1.674a7 7 0 0 0-.656 2.5zM4.847 5a12.5 12.5 0 0 0-.338 2.5H7.5V5zM8.5 5v2.5h2.99a12.5 12.5 0 0 0-.337-2.5H8.5zM4.51 8.5a12.5 12.5 0 0 0 .337 2.5H7.5V8.5zm3.99 0V11h2.653c.187-.765.306-1.608.338-2.5zM5.145 12q.208.58.468 1.068c.552 1.035 1.218 1.65 1.887 1.855V12zm.182 2.472a7 7 0 0 1-.597-.933A9.3 9.3 0 0 1 4.09 12H2.255a7 7 0 0 0 3.072 2.472M3.82 11a13.7 13.7 0 0 1-.312-2.5h-2.49c.062.89.291 1.733.656 2.5zm6.853 3.472A7 7 0 0 0 13.745 12H11.91a9.3 9.3 0 0 1-.64 1.539 7 7 0 0 1-.597.933M8.5 12v2.923c.67-.204 1.335-.82 1.887-1.855q.26-.487.468-1.068zm3.68-1h2.146c.365-.767.594-1.61.656-2.5h-2.49a13.7 13.7 0 0 1-.312 2.5m2.802-3.5a7 7 0 0 0-.656-2.5H12.18c.174.782.282 1.623.312 2.5zM11.27 2.461c.247.464.462.98.64 1.539h1.835a7 7 0 0 0-3.072-2.472c.218.284.418.598.597.933M10.855 4a8 8 0 0 0-.468-1.068C9.835 1.897 9.17 1.282 8.5 1.077V4z";
                } else if (type === 'facebook') {
                    pathStr = "M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951";
                }

                const path = new Path2D(pathStr);
                ctx.fill(path);
                ctx.restore();

                // Generate texture and apply to entity mesh
                const texture = new THREE.CanvasTexture(canvas);
                const material = this.el.getObject3D('mesh').material;
                material.map = texture;
                material.needsUpdate = true;
            }
        });

        // Custom component for handling hover animations, click feedback, and URL navigation
        AFRAME.registerComponent('clickable-button', {
            schema: {
                url: { type: 'string', default: '' }
            },
            init: function () {
                const el = this.el;
                const data = this.data;

                // Scale up on mouseenter (Hover)
                el.addEventListener('mouseenter', () => {
                    el.setAttribute('animation__scale', {
                        property: 'scale',
                        to: '1.15 1.15 1.15',
                        dur: 150,
                        easing: 'easeOutQuad'
                    });
                });

                // Scale back to normal on mouseleave
                el.addEventListener('mouseleave', () => {
                    el.setAttribute('animation__scale', {
                        property: 'scale',
                        to: '1 1 1',
                        dur: 150,
                        easing: 'easeOutQuad'
                    });
                });

                // Tactile feedback on click press
                el.addEventListener('mousedown', () => {
                    el.setAttribute('scale', '0.9 0.9 0.9');
                });

                el.addEventListener('mouseup', () => {
                    el.setAttribute('scale', '1.15 1.15 1.15');
                });

                // Action on click/tap
                el.addEventListener('click', () => {
                    if (data.url) {
                        window.open(data.url, '_blank');
                    }
                });
            }
        });

        // Handle Marker visibility states to toggle the visual overlay helper
        window.addEventListener('DOMContentLoaded', () => {
            const marker = document.querySelector('a-marker');
            const overlay = document.getElementById('ar-overlay');

            marker.addEventListener('markerFound', () => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            });

            marker.addEventListener('markerLost', () => {
                overlay.style.display = 'flex';
                // Force layout reflow to allow transition
                overlay.offsetHeight;
                overlay.style.opacity = '1';
            });
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

    <!-- Guidance Scan Overlay (Glassmorphism) -->
    <div id="ar-overlay">
        <div class="overlay-content">
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
            <h2>Arahkan Kamera ke Hiro Marker</h2>
            <p>Scan marker "Hiro" untuk memunculkan avatar 3D, website portofolio, dan tombol interaktif Anda.</p>
        </div>
    </div>

    <!-- Main AR Scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">

        <!-- Asset Preloading -->
        <a-assets>
            <img id="portfolio-img" src="website.png">
            <a-asset-item id="stadium-logo" src="model 3d/logo anfield/scene.gltf"></a-asset-item>
        </a-assets>

        <!-- Hiro Marker -->
        <a-marker preset="hiro" id="hiro-marker" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            
            <!-- Group container for all virtual components -->
            <a-entity id="card-group" position="0 0 0">

                <!-- 1. 3D Logo / Model (Left side of the card, standing vertically) -->
                <a-entity id="3d-avatar"
                          gltf-model="#stadium-logo"
                          position="-1.0 0.2 -0.1"
                          scale="0.5 0.5 0.5"
                          rotation="0 30 0"
                          animation="property: rotation; to: 0 390 0; loop: true; dur: 12000; easing: linear">
                </a-entity>

                <!-- 2. Website Portfolio Panel (Floating in the center-top, tilted for optimal camera perspective) -->
                <!-- Layered design: Box base (dark bezel) + Plane front (texture) + Text (description) -->
                <a-box id="website-panel"
                       class="clickable"
                       clickable-button="url: https://www.google.com"
                       position="0.35 0.8 -0.3"
                       width="1.6"
                       height="1.05"
                       depth="0.05"
                       color="#13131e"
                       material="roughness: 0.4; metalness: 0.8;"
                       rotation="-15 0 0"
                       animation="property: position; to: 0.35 0.85 -0.3; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
                    
                    <!-- Webpage screenshot texture -->
                    <a-plane width="1.5"
                             height="0.95"
                             position="0 0 0.026"
                             material="src: #portfolio-img; shader: flat;">
                    </a-plane>

                    <!-- Tap Action Hint Text -->
                    <a-text value="TAP PANEL UNTUK MENGUNJUNGI WEBSITE"
                            position="0 -0.56 0"
                            align="center"
                            color="#a29bfe"
                            width="2.4"
                            font="mozillavr">
                    </a-text>
                </a-box>

                <!-- 3. Social Media Buttons Row (Aligned horizontally at the front bottom) -->
                <!-- Solid purple beveled buttons with dynamic flat vector icon plates -->

                <!-- WhatsApp Button -->
                <a-box class="clickable"
                       clickable-button="url: https://wa.me/6281234567890"
                       position="-0.45 0.05 0.5"
                       width="0.22"
                       height="0.22"
                       depth="0.04"
                       color="#5e17eb"
                       rotation="-15 0 0">
                    <a-plane width="0.18"
                             height="0.18"
                             position="0 0 0.025"
                             social-icon="type: whatsapp"
                             material="shader: flat; transparent: true;">
                    </a-plane>
                </a-box>

                <!-- LinkedIn Button -->
                <a-box class="clickable"
                       clickable-button="url: https://linkedin.com/in/rizkyabdillah"
                       position="-0.15 0.05 0.5"
                       width="0.22"
                       height="0.22"
                       depth="0.04"
                       color="#5e17eb"
                       rotation="-15 0 0">
                    <a-plane width="0.18"
                             height="0.18"
                             position="0 0 0.025"
                             social-icon="type: linkedin"
                             material="shader: flat; transparent: true;">
                    </a-plane>
                </a-box>

                <!-- Portfolio Website/Globe Button -->
                <a-box class="clickable"
                       clickable-button="url: https://www.google.com"
                       position="0.15 0.05 0.5"
                       width="0.22"
                       height="0.22"
                       depth="0.04"
                       color="#5e17eb"
                       rotation="-15 0 0">
                    <a-plane width="0.18"
                             height="0.18"
                             position="0 0 0.025"
                             social-icon="type: globe"
                             material="shader: flat; transparent: true;">
                    </a-plane>
                </a-box>

                <!-- Facebook Button -->
                <a-box class="clickable"
                       clickable-button="url: https://facebook.com/rizkyabdillah"
                       position="0.45 0.05 0.5"
                       width="0.22"
                       height="0.22"
                       depth="0.04"
                       color="#5e17eb"
                       rotation="-15 0 0">
                    <a-plane width="0.18"
                             height="0.18"
                             position="0 0 0.025"
                             social-icon="type: facebook"
                             material="shader: flat; transparent: true;">
                    </a-plane>
                </a-box>

            </a-entity>

        </a-marker>

        <!-- Camera Entity -->
        <a-entity camera="near: 0.1; far: 100;"></a-entity>

    </a-scene>

</body>

</html>
