    <!-- Main AR Scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; detectionMode: mono;"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        cursor="rayOrigin: mouse" 
        raycaster="objects: .clickable">
        <!-- Asset Preloading -->
        <a-assets>
            <img id="portfolio-img" src="assets/images/website.png">
            <a-asset-item id="stadium-logo" src="assets/models/logo_anfield/scene.gltf"></a-asset-item>
        </a-assets>

        <!-- Custom Pattern Marker -->
        <a-marker type="pattern" url="assets/markers/pattmarker.patt" id="custom-marker" smooth="true" smoothCount="5" smoothTolerance="0.01"
            smoothThreshold="2">

            <!-- Group container for all virtual components -->
            <a-entity id="card-group" position="0 0 0">

                <!-- 1. 3D Logo / Model Container (Floating and flipping sideways around Z-axis) -->
                <a-entity id="3d-avatar-container" position="-1.3 0.4 -0.1"
                    animation="property: rotation; to: 0 0 360; loop: true; dur: 6000; easing: linear">
                    <!-- Child entity (Lies flat relative to container) -->
                    <a-entity id="3d-avatar" gltf-model="#stadium-logo" scale="1.5 1.5 1.5" rotation="90 180 0">
                    </a-entity>
                </a-entity>

                <!-- 2. Website Portfolio Panel (Floating flat in the center-top, parallel to card surface - ENLARGED) -->
                <!-- Layered design: Box base (dark bezel) + Plane front (texture) + Text (description) -->
                <a-box id="website-panel" class="clickable" clickable-button="url: https://www.rizkyar.tech"
                    position="0.6 0.02 -0.4" width="2.4" height="1.6" depth="0.05" color="#13131e"
                    material="roughness: 0.4; metalness: 0.8;" rotation="-90 0 0"
                    animation="property: position; to: 0.6 0.07 -0.4; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">

                    <!-- Webpage screenshot texture -->
                    <a-plane width="2.25" height="1.48" position="0 0 0.026"
                        material="src: #portfolio-img; shader: flat;">
                    </a-plane>

                    <!-- Tap Action Hint Text -->
                    <a-text value="TAP PANEL UNTUK MENGUNJUNGI WEBSITE" position="0 -0.85 0.026" align="center"
                        color="#a29bfe" width="2.4" font="mozillavr">
                    </a-text>
                </a-box>

                <!-- 3. Profile Text (Personal Branding in 3D AR - Fulfills Min 2 Texts Requirement) -->
                <!-- Name Text (RIZKY ABDILLAH - Positioned above the panel) -->
                <a-text value="RIZKY ABDILLAH" position="0.6 0.02 -1.6" rotation="-90 0 0" align="center"
                    color="#ffffff" width="3.5" font="mozillavr" bold="true">
                </a-text>
                <!-- Title Text (WEB AR PORTOFOLIO - Positioned above the panel) -->
                <a-text value="WEB AR PORTOFOLIO" position="0.6 0.02 -1.4" rotation="-90 0 0" align="center"
                    color="#a29bfe" width="2.5" font="mozillavr">
                </a-text>

            </a-entity>

        </a-marker>

        <!-- Camera Entity -->
        <a-entity camera="near: 0.1; far: 100;"></a-entity>

    </a-scene>

</body>

</html>
